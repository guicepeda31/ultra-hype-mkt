<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultra Hype — Intelligence Criativo</title>
<script>
window._supaReady=false;
(function(){
  var s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
  s.onload=function(){window._supaReady=true;if(window._onSupaReady)window._onSupaReady();};
  s.onerror=function(){console.log("Supabase SDK nao carregou - modo offline");};
  document.head.appendChild(s);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* Estilos extraídos do original para manter a integridade visual */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--sf:#fff;--sf2:#f1f3f4;--sf3:#e8eaed;
  --b:#dadce0;--b2:#bdc1c6;
  --t:#202124;--t2:#5f6368;--t3:#80868b;
  --blue:#1a73e8;--blue-lt:#e8f0fe;--blue-dk:#1557b0;
  --green:#1e8e3e;--green-lt:#e6f4ea;
  --red:#d93025;--red-lt:#fce8e6;
  --amber:#f29900;--amber-lt:#fef7e0;
  --purple:#8430ce;--purple-lt:#f3e8fd;
  --teal:#129eaf;--teal-lt:#e4f7f9;
  --nav:256px;--top:64px;
  --sh1:0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
  --sh2:0 1px 2px rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15);
}
[data-theme="dark"]{
  --bg:#202124;--sf:#292a2d;--sf2:#35363a;--sf3:#3c4043;
  --b:#3c4043;--b2:#5f6368;
  --t:#e8eaed;--t2:#9aa0a6;--t3:#5f6368;
  --blue:#8ab4f8;--blue-lt:#1a3558;
  --green:#81c995;--green-lt:#0d3321;
  --red:#f28b82;--red-lt:#3c1d1d;
  --amber:#fdd663;--amber-lt:#3c2e00;
  --purple:#c58af9;--purple-lt:#2d1b4e;
  --teal:#78d9ec;--teal-lt:#00313a;
}
html,body{height:100%;overflow:hidden;font-family:'Roboto',sans-serif;font-size:14px;color:var(--t);background:var(--bg);-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh}
.nav{width:var(--nav);flex-shrink:0;background:var(--sf);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.nav-brand{display:flex;align-items:center;gap:10px;padding:16px 16px 12px}
.nav-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo svg{width:18px;height:18px;color:white}
.nav-title{font-family:'Google Sans',sans-serif;font-size:16px;font-weight:700;color:var(--t)}
.nav-title span{color:var(--blue)}
.nav-search{margin:0 12px 8px;display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--b);background:var(--sf2);color:var(--t3);font-size:13px;cursor:pointer;border-radius:20px}
.nav-scroll{flex:1;overflow-y:auto;padding:4px 8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:20px;cursor:pointer;font-size:14px;color:var(--t2);transition:background .1s;user-select:none}
.nav-item:hover{background:var(--sf2)}
.nav-item.active{background:var(--blue-lt);color:var(--blue);font-weight:500}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-divider{height:1px;background:var(--b);margin:8px 0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--top);flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 24px;gap:12px}
.topbar-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:var(--t2)}
.fab{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:20px;background:var(--blue);color:white;border:none;cursor:pointer;font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500}
.content{flex:1;overflow-y:auto;background:var(--bg)}
.panel{display:none}.panel.active{display:block}
.page{padding:24px 24px 48px;max-width:960px}
.page-hd{margin-bottom:24px}
.page-title{font-family:'Google Sans',sans-serif;font-size:28px;font-weight:400;color:var(--t)}
.search-wrap{display:flex;background:var(--sf);border:1px solid var(--b);border-radius:24px;overflow:hidden;margin-bottom:16px}
.search-wrap input{flex:1;padding:12px 16px;border:none;outline:none;font-size:15px;background:transparent}
.search-btn{padding:0 20px;background:var(--blue);color:white;border:none;cursor:pointer;font-weight:500}
.gcard{background:var(--sf);border-radius:12px;border:1px solid var(--b);box-shadow:var(--sh1);overflow:hidden}
.info-card{display:flex;gap:12px;padding:14px 16px;border-radius:8px;margin-bottom:16px;font-size:14px}
.ic-blue{background:var(--blue-lt);border:1px solid rgba(26,115,232,.2)}
.spin-wrap{padding:52px 0;text-align:center;color:var(--t3)}
.spin{width:20px;height:20px;margin:0 auto 12px;border:3px solid var(--b);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--t);color:white;border-radius:20px;padding:8px 18px;font-size:13px;opacity:0;transition:all .2s;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-ov{position:fixed;inset:0;background:rgba(32,33,36,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border-radius:16px;width:400px;max-width:92vw;padding:28px}
</style>
</head>
<body>
<div class="app">
<nav class="nav">
  <div class="nav-brand" onclick="go('home',document.getElementById('ni-home'),'Início')" style="cursor:pointer">
    <div class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
    <div class="nav-title">Ultra <span>Hype</span></div>
  </div>
  <div class="nav-scroll">
    <div class="nav-item active" id="ni-home" onclick="go('home',this,'Início')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Início</div>
    <div class="nav-divider"></div>
    <div class="nav-item" id="ni-trends" onclick="go('trends',this,'Radar de Trends')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>Radar de Trends</div>
    <div class="nav-item" id="ni-ideias" onclick="go('ideias',this,'Ideias de Campanha')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.26A7 7 0 0 1 12 2z"/></svg>Ideias de Campanha</div>
    <div class="nav-item" id="ni-prompt" onclick="go('prompt',this,'Prompt Studio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Prompt Studio</div>
  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb"><span class="bc-root">Ultra Hype</span> › <span class="bc-cur" id="bc">Início</span></div>
    <div class="tb-right">
      <span id="usage-badge" style="font-size:11px;color:var(--t3)"></span>
      <button id="btn-login" class="fab" style="background:var(--sf);color:var(--blue);border:1px solid var(--b)" onclick="showLoginModal()">Entrar</button>
      <div id="user-chip" style="display:none;align-items:center;gap:8px;padding:4px 12px;border-radius:16px;background:var(--sf2);cursor:pointer" onclick="logout()">
        <span id="user-name" style="font-size:12px;font-weight:500"></span>
      </div>
    </div>
  </div>
  <div class="content">
    <div id="tab-home" class="panel active">
      <div class="page" style="text-align:center;padding-top:60px">
        <h1 class="page-title" style="font-size:36px;margin-bottom:12px">Inteligência criativa com <b>IA</b></h1>
        <p style="color:var(--t2);margin-bottom:32px">Onde a estratégia encontra a execução em segundos.</p>
        <div class="search-wrap" style="max-width:500px;margin:0 auto">
          <input id="home-search" type="text" placeholder="Sobre o que vamos criar hoje?" onkeydown="if(event.key==='Enter')homeSearch()"/>
          <button class="search-btn" onclick="homeSearch()">Buscar</button>
        </div>
      </div>
    </div>
    <div id="tab-trends" class="panel">
      <div class="page">
        <div class="page-hd"><h1 class="page-title">Radar de <b>Trends</b></h1></div>
        <div class="search-wrap">
          <input id="inp-trends" type="text" placeholder="Tema ou nicho..."/>
          <button class="search-btn" id="btn-trends" onclick="buscarTrends()">Analisar</button>
        </div>
        <div id="out-trends"></div>
      </div>
    </div>
  </div>
</div>
</div>

<div id="login-modal" class="modal-ov" style="display:none" onclick="if(event.target===this)closeLoginModal()">
  <div class="modal">
    <h2 style="margin-bottom:20px">Entrar</h2>
    <input id="auth-email" type="email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid var(--b)"/>
    <input id="auth-pass" type="password" placeholder="Senha" style="width:100%;padding:10px;margin-bottom:20px;border-radius:8px;border:1px solid var(--b)"/>
    <button class="fab" style="width:100%" onclick="submitAuth()">Entrar</button>
    <button style="width:100%;margin-top:12px;background:none;border:none;color:var(--t3);cursor:pointer" onclick="loginGoogle()">Entrar com Google</button>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// --- CONFIG & AUTH ---
const SUPA_URL = 'https://fzqhznzstrxfrcvlupru.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Sua chave anon
let supa = null;
let currentUser = null;

function initSupa(){
  if(window.supabase && !supa){
    supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  }
  return supa;
}

// --- NAVIGATION ---
function go(id, el, label){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(el) el.classList.add('active');
  document.getElementById('bc').textContent = label;
}

// --- AI CORE ---
async function ai(prompt, maxTokens = 2000) {
  const usage = getUsage();
  if(usage >= 15 && !currentUser){
    showToast("Limite atingido. Faça login para continuar.");
    return null;
  }

  try {
    let authHeader = {};
    const s = initSupa();
    if(s) {
      const { data } = await s.auth.getSession();
      if(data?.session?.access_token) {
        authHeader = { 'Authorization': 'Bearer ' + data.session.access_token };
      }
    }

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-Requested-With': 'XMLHttpRequest',
        ...authHeader
      },
      body: JSON.stringify({ prompt, maxTokens })
    });

    if(!res.ok) throw new Error("Erro na requisição");
    const data = await res.json();
    incrementUsage();
    return data.text;
  } catch(e) {
    showToast("Falha na conexão com a IA.");
    return null;
  }
}

// --- USAGE & UI ---
function getUsage(){ return parseInt(localStorage.getItem('uh_usage') || '0'); }
function incrementUsage(){
  const n = getUsage() + 1;
  localStorage.setItem('uh_usage', n);
  updateUsageBadge();
}
function updateUsageBadge(){
  const n = getUsage();
  document.getElementById('usage-badge').textContent = `Uso: ${n}/15`;
}

async function submitAuth(){
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  const s = initSupa();
  const { data, error } = await s.auth.signInWithPassword({ email, password: pass });
  if(error) showToast("Erro: " + error.message);
  else location.reload();
}

async function logout(){
  const s = initSupa();
  await s.auth.signOut();
  localStorage.removeItem('uh-user');
  // Limpa chaves de sessão do Supabase no localStorage
  Object.keys(localStorage).forEach(k => {
    if(k.includes('supabase.auth.token')) localStorage.removeItem(k);
  });
  location.reload();
}

function showToast(m){
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// --- START ---
window._onSupaReady = async () => {
  const s = initSupa();
  const { data } = await s.auth.getSession();
  if(data?.session){
    currentUser = data.session.user;
    document.getElementById('btn-login').style.display = 'none';
    document.getElementById('user-chip').style.display = 'flex';
    document.getElementById('user-name').textContent = currentUser.email.split('@')[0];
  }
  updateUsageBadge();
};

function showLoginModal(){ document.getElementById('login-modal').style.display='flex'; }
function closeLoginModal(){ document.getElementById('login-modal').style.display='none'; }
</script>
</body>
</html>
